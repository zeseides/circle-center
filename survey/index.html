<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鋼管偏差分析 — 測量工具箱</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+TC:wght@300;400;600&display=swap');
:root{
  --bg:#0e1621;--surface:#151f2e;--card:#1a2840;--border:#1e3050;
  --accent:#3b82f6;--accent2:#06b6d4;--text:#e2e8f0;--muted:#64748b;
  --ok:#22c55e;--warn:#f59e0b;--danger:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding:24px 16px}
.page{max-width:1000px;margin:0 auto}
.back{display:inline-flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--muted);text-decoration:none;font-family:'IBM Plex Mono',monospace;letter-spacing:0.06em;margin-bottom:20px;transition:color 0.2s}
.back:hover{color:var(--accent)}
.header{margin-bottom:28px}
.header h1{font-size:1.4rem;font-weight:600;color:#93c5fd;font-family:'IBM Plex Mono',monospace;letter-spacing:0.05em}
.header p{font-size:0.8rem;color:var(--muted);margin-top:4px}
.upload-section{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.upload-card{background:var(--card);border:2px dashed var(--border);border-radius:12px;padding:20px;transition:border-color 0.2s}
.upload-card.loaded{border-color:var(--ok);border-style:solid}
.upload-card .uc-label{display:block;font-size:0.72rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;font-family:'IBM Plex Mono',monospace}
.upload-name{font-size:0.85rem;color:var(--text);margin-bottom:12px;min-height:1.3em;word-break:break-all}
.upload-name.ok{color:var(--ok)}
.file-input-btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 14px;font-size:0.8rem;color:var(--muted);cursor:pointer;transition:all 0.2s}
.file-input-btn:hover{border-color:var(--accent);color:var(--accent)}
input[type=file]{display:none}
.tol-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:20px}
.tol-title{font-size:0.72rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px}
.tol-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.tol-field label{display:block;font-size:0.72rem;color:var(--muted);margin-bottom:6px;letter-spacing:0.04em}
.tol-field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:0.95rem;outline:none;transition:border-color 0.2s}
.tol-field input:focus{border-color:var(--accent)}
.tol-field .tol-unit{font-size:0.68rem;color:var(--muted);margin-top:4px}
.run-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.1s;margin-bottom:24px;letter-spacing:0.05em}
.run-btn:hover{opacity:0.88}
.run-btn:active{transform:scale(0.99)}
.run-btn:disabled{opacity:0.4;cursor:not-allowed}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat .sv{font-family:'IBM Plex Mono',monospace;font-size:1.5rem;font-weight:600;color:var(--accent2)}
.stat .sl{font-size:0.7rem;color:var(--muted);margin-top:2px;letter-spacing:0.06em}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.table-title{padding:14px 18px;font-size:0.75rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.tol-badge{font-size:0.68rem;color:var(--accent2)}
table{width:100%;border-collapse:collapse;font-size:0.82rem}
thead th{background:var(--surface);padding:10px 12px;font-size:0.7rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:0.06em;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
thead th:first-child{text-align:center}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s}
tbody tr:hover{background:rgba(59,130,246,0.06)}
tbody td{padding:9px 12px;font-family:'IBM Plex Mono',monospace;text-align:right;color:#cbd5e1}
tbody td:first-child{text-align:center;color:#93c5fd;font-weight:600}
.chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:0.68rem;font-weight:600}
.chip-ok{background:rgba(34,197,94,0.15);color:var(--ok)}
.chip-warn{background:rgba(245,158,11,0.15);color:var(--warn)}
.chart-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:24px}
.chart-title{font-size:0.75rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;margin-bottom:16px}
canvas{display:block;margin:0 auto;max-width:100%}
.dl-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:transparent;border:1px solid var(--ok);border-radius:10px;color:var(--ok);font-family:'IBM Plex Mono',monospace;font-size:0.85rem;cursor:pointer;transition:background 0.2s;margin-bottom:12px}
.dl-btn:hover{background:rgba(34,197,94,0.08)}
.hidden{display:none}
.err{background:rgba(239,68,68,0.1);border:1px solid var(--danger);border-radius:8px;padding:12px 16px;font-size:0.82rem;color:var(--danger);margin-bottom:16px;display:none}
.err.show{display:block}
@media(max-width:600px){
  .upload-section,.tol-row{grid-template-columns:1fr}
  .summary{grid-template-columns:1fr 1fr}
  table{font-size:0.72rem}
  thead th,tbody td{padding:7px 6px}
}
</style>
</head>
<body>
<div class="page">
  <a class="back" href="../">← 測量工具箱</a>
  <div class="header">
    <h1>📐 鋼管圓心偏差分析</h1>
    <p>上傳量測資料（-1~-4 格式）與設計值，自動計算圓心偏差並產出報告</p>
  </div>

  <div class="upload-section">
    <div class="upload-card" id="cardM">
      <span class="uc-label">量測資料 TXT</span>
      <div class="upload-name" id="nameM">尚未選擇</div>
      <label class="file-input-btn" for="fileM">📂 選擇檔案</label>
      <input type="file" id="fileM" accept=".txt,.TXT,.csv">
    </div>
    <div class="upload-card" id="cardD">
      <span class="uc-label">設計值 TXT（C3 格式）</span>
      <div class="upload-name" id="nameD">尚未選擇</div>
      <label class="file-input-btn" for="fileD">📂 選擇檔案</label>
      <input type="file" id="fileD" accept=".txt,.TXT,.csv">
    </div>
  </div>

  <div class="tol-section">
    <div class="tol-title">容差設定 TOLERANCE</div>
    <div class="tol-row">
      <div class="tol-field">
        <label>水平偏移容差</label>
        <input type="number" id="tolH" value="50" min="0" step="1">
        <div class="tol-unit">單位：mm（毫米）</div>
      </div>
      <div class="tol-field">
        <label>高程偏差容差</label>
        <input type="number" id="tolV" value="20" min="0" step="1">
        <div class="tol-unit">單位：mm（毫米）</div>
      </div>
    </div>
  </div>

  <div class="err" id="errMsg"></div>
  <button class="run-btn" id="runBtn" onclick="runAnalysis()" disabled>▶ 開始分析</button>

  <div id="results" class="hidden">
    <div class="summary">
      <div class="stat"><div class="sv" id="sTotal">-</div><div class="sl">比對筆數</div></div>
      <div class="stat"><div class="sv" id="sOk">-</div><div class="sl">符合規範</div></div>
      <div class="stat"><div class="sv" id="sWarn">-</div><div class="sl">超出容差</div></div>
      <div class="stat"><div class="sv" id="sMaxH">-</div><div class="sl">最大水平偏移 (mm)</div></div>
    </div>
    <div class="table-wrap">
      <div class="table-title">
        <span>DEVIATION TABLE — 偏差明細</span>
        <span class="tol-badge" id="tolBadge"></span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>管號</th>
              <th>設計 N</th><th>設計 E</th><th>設計高程</th>
              <th>實測 N</th><th>實測 E</th><th>實測高程</th>
              <th>實測半徑</th>
              <th>ΔN (m)</th><th>ΔE (m)</th><th>水平偏移 (mm)</th><th>高程偏差 (mm)</th>
              <th>狀態</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
    <div class="chart-section">
      <div class="chart-title">SCATTER PLOT — 圓心偏移分佈（設計值為原點，單位 mm）</div>
      <canvas id="scatterChart" width="600" height="420"></canvas>
    </div>
    <button class="dl-btn" onclick="downloadCSV()">⬇ 下載 CSV 報告</button>
  </div>
</div>

<script>
let mText=null,dText=null,analysisRows=[];
function getTol(){const h=parseFloat(document.getElementById('tolH').value)||50;const v=parseFloat(document.getElementById('tolV').value)||20;return{h:h/1000,v:v/1000,hmm:h,vmm:v};}
document.getElementById('fileM').addEventListener('change',function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{mText=e.target.result;document.getElementById('nameM').textContent=f.name;document.getElementById('nameM').className='upload-name ok';document.getElementById('cardM').className='upload-card loaded';checkReady();};r.readAsText(f,'utf-8');});
document.getElementById('fileD').addEventListener('change',function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{dText=e.target.result;document.getElementById('nameD').textContent=f.name;document.getElementById('nameD').className='upload-name ok';document.getElementById('cardD').className='upload-card loaded';checkReady();};r.readAsText(f,'utf-8');});
function checkReady(){document.getElementById('runBtn').disabled=!(mText&&dText);}

function circleCenter(p1,p2,p3){const[e1,n1]=p1,[e2,n2]=p2,[e3,n3]=p3;const a1=e2-e1,b1=n2-n1,c1=((e2**2-e1**2)+(n2**2-n1**2))/2;const a2=e3-e2,b2=n3-n2,c2=((e3**2-e2**2)+(n3**2-n2**2))/2;const det=a1*b2-a2*b1;if(Math.abs(det)<1e-10)return null;const cx=(c1*b2-c2*b1)/det,cy=(a1*c2-a2*c1)/det;return{cx,cy,r:Math.sqrt((cx-e1)**2+(cy-n1)**2)};}
function parseMeasured(txt){const groups={};for(const line of txt.split('\n')){const parts=line.trim().split(',');const m=parts[0].trim().match(/^(\d+)-([1-4])$/);if(!m)continue;const pid=parseInt(m[1]),s=parseInt(m[2]);const n=parseFloat(parts[1]),e=parseFloat(parts[2]),h=parseFloat(parts[3]);if(isNaN(n)||isNaN(e)||isNaN(h))continue;if(!groups[pid])groups[pid]={pts:{},h4:null};if(s<=3)groups[pid].pts[s]=[e,n];else if(s===4)groups[pid].h4=h;}const res={};for(const[pid,data]of Object.entries(groups)){const pts=data.pts;if(!pts[1]||!pts[2]||!pts[3])continue;const c=circleCenter(pts[1],pts[2],pts[3]);if(!c)continue;res[pid]={ce:c.cx,cn:c.cy,r:c.r,h:data.h4};}return res;}
function parseDesign(txt){const d={};for(const line of txt.split('\n')){const parts=line.trim().split(',');if(!/^\d+$/.test(parts[0].trim()))continue;const pid=parseInt(parts[0]);const n=parseFloat(parts[1]),e=parseFloat(parts[2]),h=parseFloat(parts[3]);if(isNaN(n)||isNaN(e)||isNaN(h))continue;d[pid]={dn:n,de:e,dh:h};}return d;}

function runAnalysis(){
  document.getElementById('errMsg').className='err';
  try{
    const measured=parseMeasured(mText),design=parseDesign(dText);
    const common=Object.keys(measured).filter(k=>design[k]).map(Number).sort((a,b)=>a-b);
    if(!common.length){showErr('找不到可比對的資料，請確認管號格式（需含 -1 -2 -3 -4）');return;}
    const tol=getTol();
    analysisRows=common.map(pid=>{const m=measured[pid],d=design[pid];const dN=m.cn-d.dn,dE=m.ce-d.de;const horiz=Math.sqrt(dN**2+dE**2);const dH=m.h!==null?m.h-d.dh:null;return{pid,dn:d.dn,de:d.de,dh:d.dh,mn:m.cn,me:m.ce,mh:m.h,mr:m.r,dN,dE,horiz,dH};});
    renderSummary(tol);renderTable(tol);renderChart(tol);
    document.getElementById('results').className='';
    document.getElementById('tolBadge').textContent=`水平容差 ±${tol.hmm}mm　高程容差 ±${tol.vmm}mm`;
  }catch(e){showErr('解析錯誤：'+e.message);}
}
function showErr(msg){const el=document.getElementById('errMsg');el.textContent=msg;el.className='err show';}
function fmt(v,d=4){return v==null?'—':v.toFixed(d);}
function isWarn(row,tol){return Math.abs(row.horiz)>tol.h||(row.dH!==null&&Math.abs(row.dH)>tol.v);}

function renderSummary(tol){const total=analysisRows.length;const warns=analysisRows.filter(r=>isWarn(r,tol)).length;const maxH=Math.max(...analysisRows.map(r=>r.horiz));document.getElementById('sTotal').textContent=total;document.getElementById('sOk').textContent=total-warns;document.getElementById('sWarn').textContent=warns;document.getElementById('sMaxH').textContent=(maxH*1000).toFixed(1);}

function renderTable(tol){const tbody=document.getElementById('tableBody');tbody.innerHTML='';for(const row of analysisRows){const w=isWarn(row,tol);const hw=Math.abs(row.horiz)>tol.h;const vw=row.dH!==null&&Math.abs(row.dH)>tol.v;const chip=w?'<span class="chip chip-warn">⚠ 超出</span>':'<span class="chip chip-ok">✓ 符合</span>';const hc=hw?'color:var(--warn)':'color:var(--ok)';const vc=vw?'color:var(--warn)':'color:var(--ok)';const horizMm=(row.horiz*1000).toFixed(2);const dHmm=row.dH!==null?(row.dH*1000).toFixed(2):'—';const dHSign=row.dH!==null?(row.dH>=0?'+':'')+dHmm:dHmm;tbody.innerHTML+=`<tr><td>${row.pid}</td><td>${fmt(row.dn)}</td><td>${fmt(row.de)}</td><td>${fmt(row.dh)}</td><td>${fmt(row.mn)}</td><td>${fmt(row.me)}</td><td>${row.mh!=null?fmt(row.mh):'—'}</td><td>${fmt(row.mr)}</td><td>${(row.dN>=0?'+':'')+fmt(row.dN)}</td><td>${(row.dE>=0?'+':'')+fmt(row.dE)}</td><td style="${hc}">${horizMm}</td><td style="${vc}">${dHSign}</td><td style="text-align:center">${chip}</td></tr>`;}}

function renderChart(tol){const cvs=document.getElementById('scatterChart');const ctx=cvs.getContext('2d');const W=cvs.width,H=cvs.height,pad=60;ctx.clearRect(0,0,W,H);const dEsmm=analysisRows.map(r=>r.dE*1000);const dNsmm=analysisRows.map(r=>r.dN*1000);const tolMm=tol.hmm;const absMax=Math.max(...[...dEsmm,...dNsmm].map(Math.abs),tolMm)+tolMm*0.3;const minV=-absMax,maxV=absMax,range=maxV-minV;const toX=v=>(v-minV)/range*(W-pad*2)+pad;const toY=v=>H-((v-minV)/range*(H-pad*2)+pad);const step=Math.ceil(tolMm/2/10)*10||10;ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;for(let i=Math.ceil(minV/step)*step;i<=maxV;i+=step){ctx.beginPath();ctx.moveTo(toX(i),pad);ctx.lineTo(toX(i),H-pad);ctx.stroke();ctx.beginPath();ctx.moveTo(pad,toY(i));ctx.lineTo(W-pad,toY(i));ctx.stroke();}ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(toX(0),pad);ctx.lineTo(toX(0),H-pad);ctx.stroke();ctx.beginPath();ctx.moveTo(pad,toY(0));ctx.lineTo(W-pad,toY(0));ctx.stroke();const rPx=(tolMm/range)*(W-pad*2);ctx.beginPath();ctx.arc(toX(0),toY(0),rPx,0,Math.PI*2);ctx.strokeStyle='rgba(245,158,11,0.6)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='rgba(245,158,11,0.5)';ctx.font='10px IBM Plex Mono,monospace';ctx.textAlign='left';ctx.fillText(`±${tolMm}mm`,toX(0)+rPx+4,toY(0)-4);analysisRows.forEach(row=>{const x=toX(row.dE*1000),y=toY(row.dN*1000);const w=isWarn(row,tol);const col=w?'#f59e0b':'#22c55e';ctx.beginPath();ctx.moveTo(toX(0),toY(0));ctx.lineTo(x,y);ctx.strokeStyle=col+'44';ctx.lineWidth=1;ctx.stroke();ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();ctx.strokeStyle='#0e1621';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle='#e2e8f0';ctx.font='bold 11px IBM Plex Mono,monospace';ctx.textAlign='left';ctx.fillText(String(row.pid),x+8,y-4);});ctx.fillStyle='#475569';ctx.font='11px IBM Plex Mono,monospace';ctx.textAlign='center';ctx.fillText('ΔE (mm)',W/2,H-8);ctx.save();ctx.translate(13,H/2);ctx.rotate(-Math.PI/2);ctx.fillText('ΔN (mm)',0,0);ctx.restore();ctx.fillStyle='#475569';ctx.font='10px IBM Plex Mono';ctx.textAlign='center';for(let i=Math.ceil(minV/step)*step;i<=maxV;i+=step){ctx.fillText(i,toX(i),H-pad+14);ctx.textAlign='right';ctx.fillText(i,pad-5,toY(i)+4);ctx.textAlign='center';}ctx.fillStyle='#22c55e';ctx.beginPath();ctx.arc(W-140,18,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#cbd5e1';ctx.textAlign='left';ctx.font='10px Noto Sans TC,sans-serif';ctx.fillText('符合',W-130,22);ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(W-88,18,5,0,Math.PI*2);ctx.fill();ctx.fillText('超出',W-78,22);}

function downloadCSV(){const tol=getTol();const bom='\uFEFF';const headers=['管號','設計N','設計E','設計高程','實測N','實測E','實測高程','實測半徑','ΔN(m)','ΔE(m)','水平偏移(mm)','高程偏差(mm)','狀態',`水平容差(mm)=${tol.hmm}`,`高程容差(mm)=${tol.vmm}`];const lines=[headers.join(',')];for(const row of analysisRows){const w=isWarn(row,tol);lines.push([row.pid,row.dn.toFixed(4),row.de.toFixed(4),row.dh.toFixed(4),row.mn.toFixed(4),row.me.toFixed(4),row.mh!=null?row.mh.toFixed(4):'',row.mr.toFixed(4),(row.dN>=0?'+':'')+row.dN.toFixed(4),(row.dE>=0?'+':'')+row.dE.toFixed(4),(row.horiz*1000).toFixed(2),row.dH!=null?(row.dH*1000).toFixed(2):'',w?'超出容差':'符合','',''].join(','));}const blob=new Blob([bom+lines.join('\n')],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='鋼管圓心偏差報告.csv';a.click();}
</script>
</body>
</html>
